server:
  port: 8080

spring:
  application:
    name: apexmatch-gateway

  # =============================================
  # 数据库配置（MySQL）
  # =============================================
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:apexmatch}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000

  # =============================================
  # Redis 配置
  # =============================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# =============================================
# 撮合引擎配置
# =============================================
apexmatch:
  engine:
    # 引擎类型：java（默认）| rust
    type: java
    # Rust 引擎动态库路径（仅 type=rust 时需要）
    # macOS:  /path/to/libapexmatch_engine_rs.dylib
    # Linux:  /path/to/libapexmatch_engine_rs.so
    rust-library-path: ${APEXMATCH_RUST_LIB_PATH:./libapexmatch_engine_rs.dylib}
    # 启动时初始化的交易对列表
    symbols:
      - BTC-USDT
      - ETH-USDT
  # 限流配置
  rate-limit:
    max-tokens: 1000
    refill-per-second: 500
  # 熔断配置
  circuit-breaker:
    failure-threshold: 10
    cooldown-ms: 30000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.apexmatch: INFO
    org.springframework.web.socket: INFO
